<!DOCTYPE html>
<html lang="{{ .Site.Language }}">
    <head>
        {{ partial "head.html" . }}
    </head>

    {{ block "body" . }}
        <body class="crt-page">
    {{ end }}
    
        <!-- CRT Aurora background canvas -->
        <canvas id="crt-aurora"></canvas>
        
        <!-- Particle field canvas -->
        <canvas id="particle-field"></canvas>
        
        <!-- Cursor halo element -->
        <div id="cursor-halo"></div>
        
        <!-- Cursor effects canvas -->
        <canvas id="cursor-fx"></canvas>
    
        <div class="container">
            {{ partial "header.html" . }}

            <div class="content">
                {{ block "main" . }}{{ end }}
            </div>

            {{ block "footer" . }}
                {{ partial "footer.html" . }}
            {{ end }}
        </div>

        {{ partial "javascript.html" . }}
    </body>
</html>
