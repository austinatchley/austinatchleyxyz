<!DOCTYPE html>
<html lang="{{ .Site.Language }}">
    <head>
        {{ partial "head.html" . }}
    </head>

    <body class="crt-page{{ if .Site.Params.backgroundImage }} background-image{{ end }}"{{ if .Site.Params.backgroundImage }} style="background-image: url('{{ .Site.Params.backgroundImage }}');"{{ end }}>

        <canvas id="crt-aurora" aria-hidden="true" role="presentation"></canvas>

        <div class="container">
            {{ partial "header.html" . }}

            <div class="content">
                {{ block "main" . }}{{ end }}
            </div>

            {{ block "footer" . }}
                {{ partial "footer.html" . }}
            {{ end }}
        </div>

        {{ partial "javascript.html" . }}
    </body>
</html>
